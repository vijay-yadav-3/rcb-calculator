name: Fetch Cricket Data (Cricbuzz Scraper)

on:
  schedule:
    # 6-8 PM IST (12:30-14:30 UTC) — cover 12-15 UTC to account for half-hour offset
    - cron: '*/5 12-14 * * *'
    # 10 PM - 12 AM IST (16:30-18:30 UTC) — cover 16-19 UTC
    - cron: '*/5 16-18 * * *'
  workflow_dispatch:

jobs:
  fetch-and-update-gist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch data from Cricbuzz
        run: node scripts/fetch-cricbuzz.js

      - name: Validate JSON files
        run: |
          python3 -c "import json; json.load(open('public/data/pointsTable.json'))" || { echo "Invalid pointsTable.json"; exit 1; }
          python3 -c "import json; json.load(open('public/data/schedule.json'))" || { echo "Invalid schedule.json"; exit 1; }

      - name: Update GitHub Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          POINTS=$(jq -Rs '.' public/data/pointsTable.json)
          SCHEDULE=$(jq -Rs '.' public/data/schedule.json)

          jq -n \
            --argjson points "$POINTS" \
            --argjson schedule "$SCHEDULE" \
            '{ "files": { "pointsTable.json": { "content": $points }, "schedule.json": { "content": $schedule } } }' \
          | curl -s -X PATCH \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Content-Type: application/json" \
              -d @- \
              https://api.github.com/gists/718302e78dbf7dbe320ba2b0d39eaf6a > /dev/null

          echo "Gist updated successfully"
