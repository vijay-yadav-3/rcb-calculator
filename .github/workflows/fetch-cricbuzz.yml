name: Fetch Cricket Data (Cricbuzz Scraper)

on:
  schedule:
    # 6-8 PM IST (12:30-14:30 UTC) — cover 12-15 UTC to account for half-hour offset
    - cron: '*/5 12-14 * * *'
    # 10 PM - 12 AM IST (16:30-18:30 UTC) — cover 16-19 UTC
    - cron: '*/5 16-18 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch data from Cricbuzz
        run: node scripts/fetch-cricbuzz.js

      - name: Validate JSON files
        run: |
          python3 -c "import json; json.load(open('public/data/pointsTable.json'))" || { echo "Invalid pointsTable.json"; exit 1; }
          python3 -c "import json; json.load(open('public/data/schedule.json'))" || { echo "Invalid schedule.json"; exit 1; }

      - name: Commit and force push updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/pointsTable.json public/data/schedule.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            # Check if the last commit is a data update — amend it instead of creating a new one
            if git log -1 --pretty=%s | grep -q "^chore: update cricket data$"; then
              git commit --amend --no-edit
            else
              git commit -m "chore: update cricket data"
            fi
            git push --force-with-lease
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger deploy workflow
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml
