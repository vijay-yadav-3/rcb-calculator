name: Fetch Cricket Data

on:
  schedule:
    # Runs 6:00 PM - 6:25 PM & 10:00 PM - 10:25 PM (IST)
    # (12:30 - 12:55 & 16:30 - 16:55 UTC)
    - cron: '30-59/5 12,16 * * *'

    # Runs 6:30 PM - 7:25 PM & 10:30 PM - 11:25 PM (IST)
    # (13:00 - 13:55 & 17:00 - 17:55 UTC)
    - cron: '*/5 13,17 * * *'

    # Runs 7:30 PM - 8:00 PM & 11:30 PM - 12:00 AM (IST)
    # (14:00 - 14:30 & 18:00 - 18:30 UTC)
    - cron: '0-30/5 14,18 * * *'
    
  # Allow manual trigger
  workflow_dispatch:

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data from Cricbuzz API
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          curl -s -X GET \
            "https://cricbuzz-cricket2.p.rapidapi.com/stats/v1/series/9241/points-table" \
            -H "X-RapidAPI-Key: ${RAPIDAPI_KEY}" \
            -H "X-RapidAPI-Host: cricbuzz-cricket2.p.rapidapi.com" \
            -o pointsTable.json

          curl -s -X GET \
            "https://cricbuzz-cricket2.p.rapidapi.com/series/v1/9241" \
            -H "X-RapidAPI-Key: ${RAPIDAPI_KEY}" \
            -H "X-RapidAPI-Host: cricbuzz-cricket2.p.rapidapi.com" \
            -o schedule.json

          echo "Points table size: $(wc -c < pointsTable.json) bytes"
          echo "Schedule size: $(wc -c < schedule.json) bytes"

          python3 -c "import json; json.load(open('pointsTable.json'))" || { echo "Invalid pointsTable.json"; exit 1; }
          python3 -c "import json; json.load(open('schedule.json'))" || { echo "Invalid schedule.json"; exit 1; }

      - name: Delete existing release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete cricket-data --yes --cleanup-tag 2>/dev/null || true

      - name: Create release with data assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create cricket-data \
            pointsTable.json \
            schedule.json \
            --title "Cricket Data (auto-updated)" \
            --notes "Auto-updated on $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --latest=false
